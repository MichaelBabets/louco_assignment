name: louco_assignment
description: "Louco - Ask AI Event Discovery"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.6.3
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^9.1.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/icons/2.0x/
    - assets/icons/3.0x/
